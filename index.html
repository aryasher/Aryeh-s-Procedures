:root {

  --parchment-dark: #e8dfc8;

* { box-sizing: border-box; margin: 0; padding: 0; }
body {

  padding: 1.5rem;
  font-family: 'Heebo', sans-serif;
}
.page {

.header {

}
h1 {

  font-size: 2rem;
  font-weight: 700;
  color: var(--ink);
}
.subtitle {
  font-size: 0.82rem;
  color: var(--gold);
  margin-top: 0.3rem;
  font-weight: 600;
  letter-spacing: 0.08em;
}
.body { padding: 1.5rem 1.5rem; }
.section { margin-bottom: 1.2rem; }
.section-label {
  font-size: 0.75rem;
  font-weight: 600;
  color: var(--ink-light);
  margin-bottom: 0.5rem;
  letter-spacing: 0.05em;
}
.btn-row {
  display: flex;
  flex-wrap: wrap;
  gap: 0.4rem;
}
.btn-row.wide .pick-btn { flex: 1; min-width: 70px; }
.btn-row.narrow .pick-btn { flex: 1; min-width: 50px; }
.pick-btn {
  padding: 0.6rem 0.4rem;
  background: rgba(255,255,255,0.6);
  border: 1.5px solid var(--parchment-dark);
  border-radius: 2px;
  font-family: 'Frank Ruhl Libre', serif;
  font-size: 1rem;
  color: var(--ink);
  cursor: pointer;
  text-align: center;
  transition: all 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.pick-btn:active { transform: scale(0.96); }
.pick-btn.sel {
  background: var(--ink);
  color: var(--parchment);
  border-color: var(--ink);
  font-weight: 700;
}
.divider {
  text-align: center;
  color: var(--gold);
  font-size: 0.65rem;
  letter-spacing: 0.3em;
  margin: 1rem 0 0.8rem;
}
.calc-btn {
  width: 100%;
  padding: 0.9rem;
  background: var(--ink);
  color: var(--parchment);
  border: none;
  border-radius: 2px;
  font-family: 'Frank Ruhl Libre', serif;
  font-size: 1.2rem;
  cursor: pointer;
  margin-top: 0.5rem;
  -webkit-tap-highlight-color: transparent;
}
.calc-btn:active { opacity: 0.85; }
.result {
  margin-top: 1.5rem;
  padding: 1.3rem;
  background: rgba(255,255,255,0.4);
  border: 1px solid var(--parchment-dark);
  border-right: 3px solid var(--gold);
  display: none;
}
.result.show { display: block; }
.result-label {
  font-size: 0.72rem;
  color: var(--gold);
  font-weight: 600;
  letter-spacing: 0.1em;
  margin-bottom: 0.5rem;
}
.result-psalm {
  font-family: 'Frank Ruhl Libre', serif;
  font-size: 2.6rem;
  font-weight: 900;
  color: var(--ink);
  line-height: 1;

.result-name {

  font-size: 1rem;
  color: var(--ink-light);
  margin-top: 0.4rem;

.result-opening {

  font-size: 1rem;
  color: var(--ink);
  margin-top: 0.4rem;
  font-style: italic;
}
.result-link {
  display: block;
  margin-top: 0.8rem;
  font-family: 'Heebo', sans-serif;
  font-size: 0.85rem;
  color: #ffe600;
  word-break: break-all;
  padding: 0.5rem 0.7rem;
  background: rgba(0,0,0,0.15);
  border-radius: 2px;
}
.result-link::before {

}
.result-context {
  font-size: 0.78rem;
  color: var(--crimson);
  margin-top: 0.8rem;
  padding-top: 0.8rem;
  border-top: 1px solid var(--parchment-dark);

.error {

.footer {

  border-top: 1px solid var(--parchment-dark);
  margin-top: 1rem;

.hidden { display: none !important; }

  105:{t:'\u05d4\u05d5\u05d3\u05d5 \u05dc\u05d4\'', o:'\u05d4\u05d5\u05b9\u05d3\u05d5\u05bc \u05dc\u05d9\u05d4\u05d5\u05b8\u05d4 \u05e7\u05b4\u05e8\u05b0\u05d0\u05d5\u05bc \u05d1\u05b4\u05e9\u05b0\u05c1\u05de\u05d5\u05b9'},
  114:{t:'\u05d1\u05e6\u05d0\u05ea \u05d9\u05e9\u05e8\u05d0\u05dc', o:'\u05d1\u05bc\u05b0\u05e6\u05b5\u05d0\u05ea \u05d9\u05b4\u05e9\u05c2\u05b0\u05e8\u05b8\u05d0\u05b5\u05dc \u05de\u05b4\u05de\u05bc\u05b4\u05e6\u05b0\u05e8\u05b8\u05d9\u05b4\u05dd'},
  135:{t:'\u05d4\u05dc\u05dc\u05d5\u05d9\u05d4', o:'\u05d4\u05b7\u05dc\u05b0\u05dc\u05d5\u05bc\u05d9\u05b8\u05d4\u05bc \u05d4\u05b7\u05dc\u05b0\u05dc\u05d5\u05bc \u05d0\u05b6\u05ea \u05e9\u05b5\u05c1\u05dd \u05d9\u05d4\u05d5\u05b8\u05d4'},
  136:{t:'\u05d4\u05d5\u05d3\u05d5 \u05dc\u05d4\' \u05db\u05d9 \u05d8\u05d5\u05d1', o:'\u05d4\u05d5\u05b9\u05d3\u05d5\u05bc \u05dc\u05d9\u05d4\u05d5\u05b8\u05d4 \u05db\u05bc\u05b4\u05d9 \u05d8\u05d5\u05b9\u05d1'}
};

var weekdayMap = {0:24,1:48,2:82,3:94,4:81,5:93,6:92};

// ============ STATE ============
var state = { dow: null, moed: null, pesachStart: null, sukkotStart: null };

// ============ BUILD BUTTONS ============
function makeButtons(rowId, labels, vals, stateKey, onSelect) {
  var row = document.getElementById(rowId);
  row.innerHTML = '';
  for (var i = 0; i < labels.length; i++) {
    (function(v, lbl) {
      var btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'pick-btn';
      btn.textContent = lbl;
      btn.addEventListener('click', function() {
        state[stateKey] = v;
        var btns = row.querySelectorAll('.pick-btn');
        for (var j = 0; j < btns.length; j++) btns[j].classList.remove('sel');
        btn.classList.add('sel');
        if (onSelect) onSelect(v);
      });
      row.appendChild(btn);
    })(vals[i], labels[i]);
  }
}

function onMoedSelect(v) {
  document.getElementById('pesachSection').className = 'section' + (v === 'pesach' ? '' : ' hidden');
  document.getElementById('sukkotSection').className = 'section' + (v === 'sukkot' ? '' : ' hidden');
  state.pesachStart = null;
  state.sukkotStart = null;
  // clear start button selections
  var btns = document.querySelectorAll('#pesachStartRow .pick-btn, #sukkotStartRow .pick-btn');
  for (var i = 0; i < btns.length; i++) btns[i].classList.remove('sel');
}

makeButtons('dowRow',        DOW_LABELS,          DOW_VALS,          'dow',        null);
makeButtons('moedRow',       MOED_LABELS,         MOED_VALS,         'moed',       onMoedSelect);
makeButtons('pesachStartRow',PESACH_START_LABELS, PESACH_START_VALS, 'pesachStart',null);
makeButtons('sukkotStartRow',SUKKOT_START_LABELS, SUKKOT_START_VALS, 'sukkotStart',null);

// ============ HELPERS ============
function toHeb(n) {
  if (n === 15) return '\u05d8"\u05d5';
  if (n === 16) return '\u05d8"\u05d6';
  var ones=[  '','\u05d0','\u05d1','\u05d2','\u05d3','\u05d4','\u05d5','\u05d6','\u05d7','\u05d8'];
  var tens= [  '','\u05d9','\u05db','\u05dc','\u05de','\u05e0','\u05e1','\u05e2','\u05e4','\u05e6'];
  var huns= [  '','\u05e7','\u05e8','\u05e9','\u05ea'];
  var h=Math.floor(n/100), t=Math.floor((n%100)/10), o=n%10;
  var r=(huns[h]||'')+(tens[t]||'')+(ones[o]||'');
  if (r.length>1) r=r.slice(0,-1)+'"'+r.slice(-1);
  return r;
}

function getInfo(num) {
  var p = psalms[num];
  return { display: '\u05de\u05d6\u05de\u05d5\u05e8 '+toHeb(num), name: p?p.t:'', op: p?p.o:'' };
}

function showErr(msg) {
  document.getElementById('resultBox').className = 'result';
  var e = document.getElementById('errBox');
  e.className = 'error show';
  e.textContent = msg;
}

function showRes(display, name, op, ctx, linkNum) {
  document.getElementById('errBox').className = 'error';
  document.getElementById('resultBox').className = 'result show';
  document.getElementById('rPsalm').textContent = display;
  document.getElementById('rName').textContent = name;
  document.getElementById('rOpening').textContent = op;
  document.getElementById('rCtx').textContent = ctx;
  var lnk = document.getElementById('rLink');
  if (linkNum) {
    lnk.textContent = 'sefaria.org.il/Psalms.' + linkNum;
    lnk.className = 'result-link';
  } else {
    lnk.textContent = '';
    lnk.className = 'result-link hidden';
  }
}

// ============ CALCULATE ============
document.getElementById('calcBtn').addEventListener('click', function() {
  var dow  = state.dow;
  var moed = state.moed;
  var ERR_DOW  = '\u05e0\u05d0 \u05dc\u05d1\u05d7\u05d5\u05e8 \u05d9\u05d5\u05dd \u05d1\u05e9\u05d1\u05d5\u05e2';
  var ERR_MOED = '\u05e0\u05d0 \u05dc\u05d1\u05d7\u05d5\u05e8 \u05de\u05d5\u05e2\u05d3';
  var ERR_START= '\u05e0\u05d0 \u05dc\u05d1\u05d7\u05d5\u05e8 \u05d9\u05d5\u05dd \u05ea\u05d7\u05d9\u05dc\u05ea \u05d4\u05d7\u05d2';

  if (dow === null) { showErr(ERR_DOW); return; }
  if (moed === null) { showErr(ERR_MOED); return; }

  var shabbat = (dow === 6);

  // חול
  if (moed === 'none') {
    var num = weekdayMap[dow];
    var i = getInfo(num);
    showRes(i.display, i.name, i.op, '', num);
    return;
  }
  // ר"ח
  if (moed === 'roshchodesh') {
    var i = getInfo(104);
    showRes(i.display, i.name, i.op, '\u05e8\u05d0\u05e9 \u05d7\u05d5\u05d3\u05e9', 104);
    return;
  }
  // ר"ה
  if (moed === 'roshHashana') {
    var i = getInfo(81);
    showRes(i.display, i.name, i.op, '\u05e8\u05d0\u05e9 \u05d4\u05e9\u05e0\u05d4', 81);
    return;
  }
  // שבת גוברת על שאר המועדים
  if (shabbat) {
    var i = getInfo(92);
    showRes(i.display, i.name, i.op, '\u05e9\u05d1\u05ea', 92);
    return;
  }
  if (moed === 'yomKippur') { var i=getInfo(32);  showRes(i.display,i.name,i.op,'\u05d9\u05d5\u05dd \u05d4\u05db\u05d9\u05e4\u05d5\u05e8\u05d9\u05dd',32);  return; }
  if (moed === 'chanuka')   { var i=getInfo(30);  showRes(i.display,i.name,i.op,'\u05d7\u05e0\u05d5\u05db\u05d4',30);   return; }
  if (moed === 'purim')     { var i=getInfo(22);  showRes(i.display,i.name,i.op,'\u05e4\u05d5\u05e8\u05d9\u05dd',22);   return; }
  if (moed === 'shavuot')   { var i=getInfo(19);  showRes(i.display,i.name,i.op,'\u05e9\u05d1\u05d5\u05e2\u05d5\u05ea',19); return; }

  // פסח
  if (moed === 'pesach') {
    var start = state.pesachStart;
    if (start === null) { showErr(ERR_START); return; }
    var tbl = pesachTable[start];
    var idx = (dow - start + 7) % 7;
    var num = tbl[idx];
    var i = getInfo(num);
    var ctx = '\u05e4\u05e1\u05d7 '+pesachLabels[idx]+' \u2014 \u05d9\u05d5"\u05d8 \u05e8\u05d0\u05e9\u05d5\u05df \u05d7\u05dc \u05d1'+dayNames[start];
    showRes(i.display, i.name, i.op, ctx, num);
    return;
  }

  // סוכות
  if (moed === 'sukkot') {
    var start = state.sukkotStart;
    if (start === null) { showErr(ERR_START); return; }
    var tbl = sukkotTable[start];
    var idx = (dow - start + 7) % 7;
    var num = tbl[idx];
    var display, name, op, linkNum;
    if (num === 941) {
      display = '\u05de\u05d6\u05de\u05d5\u05e8 \u05e6"\u05d3 (\u05d0\u2013\u05d8\u05d5)';
      name = '\u05d0\u05dc \u05e0\u05e7\u05de\u05d5\u05ea \u05d4\'';
      op = '\u05d0\u05b5\u05dc \u05e0\u05b0\u05e7\u05b8\u05de\u05d5\u05b9\u05ea \u05d9\u05d4\u05d5\u05b8\u05d4';
      linkNum = 94;
    } else if (num === 942) {
      display = '\u05de\u05d6\u05de\u05d5\u05e8 \u05e6"\u05d3 (\u05d9\u05d6\u2013\u05db\u05d2)';
      name = '\u05de\u05d9 \u05d9\u05e7\u05d5\u05dd \u05dc\u05d9';
      op = '\u05de\u05b4\u05d9 \u05d9\u05b8\u05e7\u05d5\u05bc\u05dd \u05dc\u05b4\u05d9 \u05e2\u05b4\u05dd \u05de\u05b0\u05e8\u05b5\u05e2\u05b4\u05d9\u05dd';
      linkNum = 94;
    } else {
      var i = getInfo(num);
      display = i.display; name = i.name; op = i.op; linkNum = num;
    }
    var ctx = '\u05e1\u05d5\u05db\u05d5\u05ea '+sukkotLabels[idx]+' \u2014 \u05d9\u05d5"\u05d8 \u05e8\u05d0\u05e9\u05d5\u05df \u05d7\u05dc \u05d1'+dayNames[start];
    showRes(display, name, op, ctx, linkNum);
    return;
  }
});
</script>
